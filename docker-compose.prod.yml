services:
 web:
   image: roseshane/portfolio:latest
   command: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:8000"
   restart: always
   volumes:
     - static_volume:/app/staticfiles
     - media_volume:/app/media
   environment:
     - PYTHONUNBUFFERED=1
   env_file:
     - .env.prod

 nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      - web

volumes:
  static_volume:
  media_volume:

