repos:
  - repo: https://github.com/pycqa/isort
    rev: 8.0.1
    hooks:
      - id: isort
        args: ["--profile", "black"] # Required to stop isort from fighting with black!

  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  - repo: https://github.com/rtts/djhtml
    rev: 3.0.11
    hooks:
      - id: djhtml
